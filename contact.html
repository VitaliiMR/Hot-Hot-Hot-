<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt SPICY</title>
    <link rel="stylesheet" href="assets/css/Spicy.css">
</head>
<body>
    <section class="kontakt">
        <div class="kontakt-info">
            <h1>Kontakt SPICY</h1>
            <p>Her er dine kontaktoplysninger forhåndsutfyldt:</p>
            <form>
                <label for="name">Navn</label>
                <input id="name" type="text" value="Dit Navn" readonly>

                <label for="phone">Telefon</label>
                <input id="phone" type="tel" value="+45 12 34 56 78" readonly>

                <label for="email">Email</label>
                <input id="email" type="email" value="din.email@example.com" readonly>

                <label for="message">Besked</label>
                <textarea id="message" rows="5">Hej SPICY-team,

Jeg ønsker at høre mere om jeres produkter.

Med venlig hilsen,
Dit Navn</textarea>
            </form>
            <p><a href="Spicy.html">Tilbage til forsiden</a></p>
        </div>
    </section>
</body>
</html>
